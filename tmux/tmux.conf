# AgendaCraft server tmux configuration. No plugin manager is required.
set -g prefix C-b
unbind C-a

set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on

# Modern terminal capabilities while retaining compatibility with SSH clients.
set -g default-terminal "tmux-256color"
# terminal-overrides predates tmux 3.2, unlike terminal-features.
set -as terminal-overrides ",xterm-256color:Tc"

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

set -g status on
set -g status-interval 5
set -g status-style "fg=colour250,bg=colour235"
set -g status-left-length 60
set -g status-right-length 100
set -g status-left "#[bold,fg=colour231,bg=colour31] #H #[default] "
set -g status-right "#[fg=colour244]load #(cut -d ' ' -f 1-3 /proc/loadavg 2>/dev/null) #[fg=colour250]| %Y-%m-%d %H:%M "
setw -g window-status-current-format "#[bold,fg=colour231,bg=colour31] #I:#W#F #[default]"
setw -g window-status-format " #I:#W#F "

# Convenient splits that preserve the current pane's working directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
