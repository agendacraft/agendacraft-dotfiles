# Production VPS prompt: deliberately small, fast, and hard to mistake for local.
format = """$username$hostname$directory$git_branch$git_status$status$cmd_duration$line_break$character"""
scan_timeout = 10
command_timeout = 200
add_newline = true

[username]
show_always = true
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"

[hostname]
ssh_only = false
disabled = false
trim_at = ""
style = "bold white bg:red"
format = "[ PROD:$hostname ]($style) "

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = false
read_only = " ro"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "git:"
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold purple"
format = "([$all_status$ahead_behind]($style) )"

[status]
disabled = false
symbol = "exit:"
style = "bold red"
format = "[$symbol$status]($style) "

[cmd_duration]
min_time = 2_000
show_milliseconds = false
style = "yellow"
format = "took [$duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
